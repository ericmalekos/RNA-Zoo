# Ruff configuration for the RNA-Zoo repository.

[tool.ruff]
line-length = 100
target-version = "py310"
# Exclude upstream model clones (gitignored, not part of this repo)
exclude = ["RiboNN", "seq2ribo", "Riboformer", "RiboTIE", "enigma", "tmp"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
