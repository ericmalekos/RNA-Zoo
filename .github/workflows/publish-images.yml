name: Publish Docker images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ericmalekos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Translation
          - name: rnazoo-ribonn
            dockerfile: Dockerfiles/Dockerfile.RiboNN
          - name: rnazoo-ribonn-cpu
            dockerfile: Dockerfiles/Dockerfile.RiboNN.cpu
          - name: rnazoo-riboformer
            dockerfile: Dockerfiles/Dockerfile.Riboformer
          - name: rnazoo-riboformer-cpu
            dockerfile: Dockerfiles/Dockerfile.Riboformer.cpu
          - name: rnazoo-tristan
            dockerfile: Dockerfiles/Dockerfile.TRISTAN
          - name: rnazoo-tristan-cpu
            dockerfile: Dockerfiles/Dockerfile.TRISTAN.cpu
          - name: rnazoo-seq2ribo
            dockerfile: Dockerfiles/Dockerfile.seq2ribo
          - name: rnazoo-saluki
            dockerfile: Dockerfiles/Dockerfile.Saluki
          - name: rnazoo-saluki-cpu
            dockerfile: Dockerfiles/Dockerfile.Saluki.cpu
          - name: rnazoo-translationai
            dockerfile: Dockerfiles/Dockerfile.TranslationAI
          - name: rnazoo-translationai-cpu
            dockerfile: Dockerfiles/Dockerfile.TranslationAI.cpu
          - name: rnazoo-codontransformer
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer
          - name: rnazoo-codontransformer-cpu
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer.cpu
          # Foundation models
          - name: rnazoo-rnafm
            dockerfile: Dockerfiles/Dockerfile.RNAFM
          - name: rnazoo-rnafm-cpu
            dockerfile: Dockerfiles/Dockerfile.RNAFM.cpu
          - name: rnazoo-rinalmo
            dockerfile: Dockerfiles/Dockerfile.RiNALMo
          - name: rnazoo-rinalmo-cpu
            dockerfile: Dockerfiles/Dockerfile.RiNALMo.cpu
          - name: rnazoo-ernierna
            dockerfile: Dockerfiles/Dockerfile.ERNIERNA
          # Structure
          - name: rnazoo-rnaformer
            dockerfile: Dockerfiles/Dockerfile.RNAformer
          - name: rnazoo-rhofold
            dockerfile: Dockerfiles/Dockerfile.RhoFold
          - name: rnazoo-rhofold-cpu
            dockerfile: Dockerfiles/Dockerfile.RhoFold.cpu
          - name: rnazoo-spotrna
            dockerfile: Dockerfiles/Dockerfile.SPOTRNA
          - name: rnazoo-spotrna-cpu
            dockerfile: Dockerfiles/Dockerfile.SPOTRNA.cpu
          # Modification
          - name: rnazoo-multirm
            dockerfile: Dockerfiles/Dockerfile.MultiRM
          - name: rnazoo-multirm-cpu
            dockerfile: Dockerfiles/Dockerfile.MultiRM.cpu
          # mRNA design
          - name: rnazoo-utrlm
            dockerfile: Dockerfiles/Dockerfile.UTRLM
          - name: rnazoo-utrlm-cpu
            dockerfile: Dockerfiles/Dockerfile.UTRLM.cpu

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # Tag pushes use the tag name (v*); workflow_dispatch / branch pushes
          # use a short SHA so the tag is always a valid docker reference.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${VERSION}"
            echo "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
