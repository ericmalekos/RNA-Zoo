name: Publish Docker images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ericmalekos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Translation
          - name: rnazoo-ribonn
            dockerfile: Dockerfiles/Dockerfile.RiboNN
          - name: rnazoo-ribonn-cpu
            dockerfile: Dockerfiles/Dockerfile.RiboNN.cpu
          - name: rnazoo-riboformer
            dockerfile: Dockerfiles/Dockerfile.Riboformer
          - name: rnazoo-tristan
            dockerfile: Dockerfiles/Dockerfile.TRISTAN
          - name: rnazoo-tristan-cpu
            dockerfile: Dockerfiles/Dockerfile.TRISTAN.cpu
          - name: rnazoo-seq2ribo
            dockerfile: Dockerfiles/Dockerfile.seq2ribo
          - name: rnazoo-saluki
            dockerfile: Dockerfiles/Dockerfile.Saluki
          - name: rnazoo-translationai
            dockerfile: Dockerfiles/Dockerfile.TranslationAI
          - name: rnazoo-codontransformer
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer
          # Foundation models
          - name: rnazoo-rnafm
            dockerfile: Dockerfiles/Dockerfile.RNAFM
          - name: rnazoo-rinalmo
            dockerfile: Dockerfiles/Dockerfile.RiNALMo
          - name: rnazoo-ernierna
            dockerfile: Dockerfiles/Dockerfile.ERNIERNA
          # Structure
          - name: rnazoo-rnaformer
            dockerfile: Dockerfiles/Dockerfile.RNAformer
          - name: rnazoo-rhofold
            dockerfile: Dockerfiles/Dockerfile.RhoFold
          - name: rnazoo-rhofold-cpu
            dockerfile: Dockerfiles/Dockerfile.RhoFold.cpu
          - name: rnazoo-spotrna
            dockerfile: Dockerfiles/Dockerfile.SPOTRNA
          # Modification
          - name: rnazoo-multirm
            dockerfile: Dockerfiles/Dockerfile.MultiRM
          # mRNA design
          - name: rnazoo-utrlm
            dockerfile: Dockerfiles/Dockerfile.UTRLM

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
