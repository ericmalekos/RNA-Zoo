name: Publish Docker images

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ericmalekos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ribozoo-ribonn
            dockerfile: Dockerfiles/Dockerfile.RiboNN
          - name: ribozoo-ribonn-cpu
            dockerfile: Dockerfiles/Dockerfile.RiboNN.cpu
          - name: ribozoo-riboformer
            dockerfile: Dockerfiles/Dockerfile.Riboformer
          - name: ribozoo-tristan
            dockerfile: Dockerfiles/Dockerfile.TRISTAN
          - name: ribozoo-seq2ribo
            dockerfile: Dockerfiles/Dockerfile.seq2ribo
          - name: ribozoo-saluki
            dockerfile: Dockerfiles/Dockerfile.Saluki
          - name: ribozoo-translationai
            dockerfile: Dockerfiles/Dockerfile.TranslationAI
          - name: ribozoo-codontransformer
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
