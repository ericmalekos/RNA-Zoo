name: Publish Docker images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      images:
        description: 'Image(s) to build: "all", a single matrix name, or a comma-separated list with no spaces (e.g. "rnazoo-plantrnafm,rnazoo-plantrnafm-cpu")'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ericmalekos

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          IMAGES: ${{ inputs.images || 'all' }}
        run: |
          MATRIX_YAML=$(cat <<'YAML'
          # Translation
          - name: rnazoo-ribonn
            dockerfile: Dockerfiles/Dockerfile.RiboNN
          - name: rnazoo-ribonn-cpu
            dockerfile: Dockerfiles/Dockerfile.RiboNN.cpu
          - name: rnazoo-riboformer
            dockerfile: Dockerfiles/Dockerfile.Riboformer
          - name: rnazoo-riboformer-cpu
            dockerfile: Dockerfiles/Dockerfile.Riboformer.cpu
          - name: rnazoo-tristan
            dockerfile: Dockerfiles/Dockerfile.TRISTAN
          - name: rnazoo-tristan-cpu
            dockerfile: Dockerfiles/Dockerfile.TRISTAN.cpu
          - name: rnazoo-seq2ribo
            dockerfile: Dockerfiles/Dockerfile.seq2ribo
          - name: rnazoo-saluki
            dockerfile: Dockerfiles/Dockerfile.Saluki
          - name: rnazoo-saluki-cpu
            dockerfile: Dockerfiles/Dockerfile.Saluki.cpu
          - name: rnazoo-translationai
            dockerfile: Dockerfiles/Dockerfile.TranslationAI
          - name: rnazoo-translationai-cpu
            dockerfile: Dockerfiles/Dockerfile.TranslationAI.cpu
          - name: rnazoo-codontransformer
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer
          - name: rnazoo-codontransformer-cpu
            dockerfile: Dockerfiles/Dockerfile.CodonTransformer.cpu
          # Foundation models
          - name: rnazoo-rnafm
            dockerfile: Dockerfiles/Dockerfile.RNAFM
          - name: rnazoo-rnafm-cpu
            dockerfile: Dockerfiles/Dockerfile.RNAFM.cpu
          - name: rnazoo-rinalmo
            dockerfile: Dockerfiles/Dockerfile.RiNALMo
          - name: rnazoo-rinalmo-cpu
            dockerfile: Dockerfiles/Dockerfile.RiNALMo.cpu
          - name: rnazoo-ernierna
            dockerfile: Dockerfiles/Dockerfile.ERNIERNA
          - name: rnazoo-orthrus
            dockerfile: Dockerfiles/Dockerfile.Orthrus
          - name: rnazoo-rnaernie
            dockerfile: Dockerfiles/Dockerfile.RNAErnie
          - name: rnazoo-rnaernie-cpu
            dockerfile: Dockerfiles/Dockerfile.RNAErnie.cpu
          - name: rnazoo-plantrnafm
            dockerfile: Dockerfiles/Dockerfile.PlantRNAFM
          - name: rnazoo-plantrnafm-cpu
            dockerfile: Dockerfiles/Dockerfile.PlantRNAFM.cpu
          - name: rnazoo-calm
            dockerfile: Dockerfiles/Dockerfile.CaLM
          - name: rnazoo-calm-cpu
            dockerfile: Dockerfiles/Dockerfile.CaLM.cpu
          - name: rnazoo-mrnabert
            dockerfile: Dockerfiles/Dockerfile.mRNABERT
          - name: rnazoo-mrnabert-cpu
            dockerfile: Dockerfiles/Dockerfile.mRNABERT.cpu
          # HydraRNA: weights are Google-Drive-only; the GH-hosted runner cannot
          # access /home/eric/hydrarna_weights_local/HydraRNA_model.pt at build time.
          # Re-enable once weights are mirrored to HF or Zenodo. See docs/models/HydraRNA.md.
          # - name: rnazoo-hydrarna
          #   dockerfile: Dockerfiles/Dockerfile.HydraRNA
          # Structure
          - name: rnazoo-rnaformer
            dockerfile: Dockerfiles/Dockerfile.RNAformer
          - name: rnazoo-rhofold
            dockerfile: Dockerfiles/Dockerfile.RhoFold
          - name: rnazoo-rhofold-cpu
            dockerfile: Dockerfiles/Dockerfile.RhoFold.cpu
          - name: rnazoo-spotrna
            dockerfile: Dockerfiles/Dockerfile.SPOTRNA
          - name: rnazoo-spotrna-cpu
            dockerfile: Dockerfiles/Dockerfile.SPOTRNA.cpu
          - name: rnazoo-drfold2
            dockerfile: Dockerfiles/Dockerfile.DRfold2
          # Modification
          - name: rnazoo-multirm
            dockerfile: Dockerfiles/Dockerfile.MultiRM
          - name: rnazoo-multirm-cpu
            dockerfile: Dockerfiles/Dockerfile.MultiRM.cpu
          # mRNA design
          - name: rnazoo-utrlm
            dockerfile: Dockerfiles/Dockerfile.UTRLM
          - name: rnazoo-utrlm-cpu
            dockerfile: Dockerfiles/Dockerfile.UTRLM.cpu
          YAML
          )
          FULL=$(yq -o=json <<<"$MATRIX_YAML")
          if [ "$IMAGES" = "all" ] || [ -z "$IMAGES" ]; then
            FILTERED="$FULL"
          else
            FILTERED=$(jq -c --arg names "$IMAGES" \
              '($names | split(",")) as $a | map(select(.name as $n | $a | index($n)))' \
              <<<"$FULL")
          fi
          COUNT=$(jq 'length' <<<"$FILTERED")
          echo "Selected $COUNT image(s) from input '$IMAGES'"
          jq -r '.[].name' <<<"$FILTERED" | sed 's/^/  - /'
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No matrix entries match: $IMAGES"
            exit 1
          fi
          echo "matrix=$(jq -c <<<"$FILTERED")" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # Tag pushes use the tag name (v*); workflow_dispatch / branch pushes
          # use a short SHA so the tag is always a valid docker reference.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${VERSION}"
            echo "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
