name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        # Currently no Python files in the repo (model code lives in Docker
        # images). This job is a no-op but will catch issues once we add
        # Python preprocessing scripts.

  lint-nextflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install nf-core tools
        run: pip install nf-core
      - name: Lint Nextflow pipeline
        # nf-core lint is opinionated — we allow failures for now and
        # track warnings. Remove `|| true` once we're fully compliant.
        run: nf-core pipelines lint --dir . 2>&1 | tee nf-core-lint.log || true
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nf-core-lint
          path: nf-core-lint.log

  build-ribonn-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build RiboNN CPU image
        run: |
          docker build \
            -t ghcr.io/ericmalekos/rnazoo-ribonn-cpu:latest \
            -f Dockerfiles/Dockerfile.RiboNN.cpu .
      - name: Smoke test RiboNN image
        run: |
          docker run --rm ghcr.io/ericmalekos/rnazoo-ribonn-cpu:latest \
            bash -c "cd /app && python3 -m src.main --predict human" \
            | grep -q "Predictions written"
      - name: Save image for pipeline test
        run: docker save ghcr.io/ericmalekos/rnazoo-ribonn-cpu:latest | gzip > ribonn-cpu.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: ribonn-cpu-image
          path: ribonn-cpu.tar.gz
          retention-days: 1

  pipeline-test-cpu:
    needs: build-ribonn-cpu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Load RiboNN CPU image
        uses: actions/download-artifact@v4
        with:
          name: ribonn-cpu-image
      - run: docker load < ribonn-cpu.tar.gz

      - name: Run pipeline (test profile, CPU, docker)
        run: nextflow run . -profile test,docker,cpu

      - name: Check RiboNN outputs
        run: |
          test -f results_test/ribonn/prediction_output.txt
          # Verify we got predictions for the expected number of transcripts
          LINE_COUNT=$(wc -l < results_test/ribonn/prediction_output.txt)
          echo "Output has $LINE_COUNT lines (header + transcripts)"
          test "$LINE_COUNT" -gt 1

      - name: Upload pipeline results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-test-results
          path: |
            results_test/
            .nextflow.log
