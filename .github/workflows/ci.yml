name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/ruff-action@v3

  lint-nextflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install nf-core tools
        run: pip install nf-core
      - name: Lint Nextflow pipeline
        run: nf-core pipelines lint --dir . 2>&1 | tee nf-core-lint.log || true
      - name: Upload lint report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: nf-core-lint
          path: nf-core-lint.log
